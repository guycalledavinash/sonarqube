# SonarQube artifact for:
# https://github.com/guycalledavinash/miscellaneous/tree/main/test-8-apr-25

sonar.projectKey=guycalledavinash_miscellaneous_test-8-apr-25
sonar.projectName=miscellaneous-test-8-apr-25
sonar.projectVersion=1.0

# Point this at the checked-out test-8-apr-25 project root when scanning.
sonar.projectBaseDir=.

# Source and test locations
sonar.sources=.
sonar.tests=.

# Exclude generated/build/vendor assets from source analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.next/**,**/out/**,**/target/**,**/*.min.js

# Identify common test file naming patterns
sonar.test.inclusions=**/*test*/**,**/*spec*/**,**/*Test*/**

# Coverage report paths (uncomment/apply what the project produces)
# JavaScript/TypeScript (Jest/nyc)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Python (coverage.py)
# sonar.python.coverage.reportPaths=coverage.xml

# Java (JaCoCo XML)
# sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Optional: reduce duplication false positives for lock/generated files
sonar.cpd.exclusions=**/package-lock.json,**/yarn.lock,**/pnpm-lock.yaml

# File encoding
sonar.sourceEncoding=UTF-8
